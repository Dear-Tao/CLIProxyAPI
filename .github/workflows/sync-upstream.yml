name: Sync Upstream

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/router-for-me/CLIProxyAPI.git
          git fetch upstream

      - name: Merge upstream main into fork main
        run: |
          git checkout main
          git merge upstream/main --no-edit --strategy=recursive -X theirs

      - name: Push changes
        run: |
          git push origin main
