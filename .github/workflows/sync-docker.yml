name: Sync & Docker Build

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/router-for-me/CLIProxyAPI.git
          git fetch upstream

      - name: Merge upstream main into fork main
        id: merge
        run: |
          git checkout main
          CHANGED=0
          if ! git merge-base --is-ancestor upstream/main main; then
            git merge upstream/main --no-edit --strategy=recursive -X theirs
            CHANGED=1
          fi
          git push origin main
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: Set image name lowercase
        id: meta
        if: steps.merge.outputs.changed == '1' || github.event_name == 'workflow_dispatch'
        run: |
          echo "image=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/cliproxyapi" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        if: steps.merge.outputs.changed == '1' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.merge.outputs.changed == '1' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.merge.outputs.changed == '1' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
