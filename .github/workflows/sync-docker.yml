name: Sync & Docker Build

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/router-for-me/CLIProxyAPI.git
          git fetch upstream
      - name: Merge upstream main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge upstream/main --no-edit --strategy-option theirs || true
      - name: Push changes
        run: |
          git push origin main
      - name: Get version and date
        id: meta
        run: |
          LATEST_TAG=$(git ls-remote --tags https://github.com/router-for-me/CLIProxyAPI.git | sed -n "s|.*/\(v[0-9.]*\)$|\1|p" | sort -V | tail -1)
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u "+%Y%m%dT%H%M%SZ")" >> $GITHUB_OUTPUT
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/dear-tao/cliproxyapi:latest
            ghcr.io/dear-tao/cliproxyapi:${{ steps.meta.outputs.tag }}
          build-args: |
            VERSION=${{ steps.meta.outputs.tag }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

